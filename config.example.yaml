# Sanitized example configuration for Oz Gateway.
# Copy this file to config.yaml for local development and replace placeholders.
# Do not commit config.yaml.

port: 3000

bots:
  - name: "assistant"
    slack_bot_token: "${ASSISTANT_SLACK_BOT_TOKEN}"
    slack_signing_secret: "${ASSISTANT_SLACK_SIGNING_SECRET}"
    oz_api_key: "${ASSISTANT_OZ_API_KEY}"
    oz_environment_id: "${ASSISTANT_OZ_ENVIRONMENT_ID}"
    oz_base_url: "${OZ_API_BASE_URL}"

    # Optional: set true only if the bot handler should receive top-level Slack messages.
    process_messages: false

    # Optional: set true only if the bot handler should receive Slack Block Kit actions.
    process_interactions: false

    # Optional MCP servers for Oz runs started by this bot.
    # This block is passed through to Oz without gateway-side ${VAR} interpolation.
    # Store referenced secrets as Oz-managed secrets, not gateway host environment variables.
    #
    # mcp_servers:
    #   shared_server:
    #     warp_id: "<shared-mcp-server-id>"
    #   example_stdio_server:
    #     command: "example-mcp-server"
    #     args:
    #       - "--mode"
    #       - "readonly"
    #     env:
    #       EXAMPLE_MCP_TOKEN: "${EXAMPLE_MCP_TOKEN}"
    #   example_http_server:
    #     url: "https://mcp.example.com/sse"
    #     headers:
    #       Authorization: "Bearer ${EXAMPLE_MCP_TOKEN}"

webhooks:
  - name: "json-task"
    source: "json_prompt"
    oz_api_key: "${JSON_TASK_OZ_API_KEY}"
    oz_environment_id: "${JSON_TASK_OZ_ENVIRONMENT_ID}"
    oz_base_url: "${OZ_API_BASE_URL}"

    # Optional but recommended for every public webhook.
    auth_header_name: "Authorization"
    auth_token: "${JSON_TASK_WEBHOOK_AUTH_TOKEN}"

    # Optional skill to attach to the spawned Oz run.
    skill_spec: "${JSON_TASK_SKILL_SPEC}"

    # Require these fields in the inbound JSON payload.
    required_payload_fields:
      - "request"

    # Fixed prompt fields included on every run.
    static_prompt_fields:
      SOURCE: "json_webhook"

    # Map inbound JSON payload fields into prompt fields.
    payload_prompt_fields:
      USER_REQUEST: "request"
      REQUEST_ID: "request_id"

  - name: "event-forwarder"
    source: "event_forwarder"
    oz_api_key: "${EVENT_FORWARDER_OZ_API_KEY}"
    oz_environment_id: "${EVENT_FORWARDER_OZ_ENVIRONMENT_ID}"
    oz_base_url: "${OZ_API_BASE_URL}"
    auth_header_name: "Authorization"
    auth_token: "${EVENT_FORWARDER_WEBHOOK_AUTH_TOKEN}"
    skill_spec: "${EVENT_FORWARDER_SKILL_SPEC}"
    required_payload_fields:
      - "event_type"
    static_prompt_fields:
      SOURCE: "event_forwarder_webhook"
    payload_prompt_fields:
      EVENT_TYPE: "event_type"
      EVENT_ID: "event_id"
